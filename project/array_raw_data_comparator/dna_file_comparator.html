
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); }
.mono { font-family: var(--font-mono); font-size: 12px; }
.drop-zone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: background 0.15s, border-color 0.15s; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.drop-zone:hover, .drop-zone.over { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
.drop-zone.loaded { border-style: solid; border-color: var(--color-border-secondary); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-info { background: var(--color-background-info); color: var(--color-text-info); }
.badge-warn { background: var(--color-background-warning); color: var(--color-text-warning); }
.badge-danger { background: var(--color-background-danger); color: var(--color-text-danger); }
.badge-success { background: var(--color-background-success); color: var(--color-text-success); }
.badge-neutral { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.tab-btn { padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; white-space: nowrap; }
.tab-btn.active { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
.snp-row { display: grid; gap: 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.snp-row:last-child { border-bottom: none; }
.snp-cell { padding: 5px 8px; font-family: var(--font-mono); font-size: 11.5px; }
.snp-header { background: var(--color-background-secondary); font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; }
.stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.notice { background: var(--color-background-info); color: var(--color-text-info); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 12.5px; }
</style>

<div id="app" style="padding: 0.5rem 0 1rem;"></div>

<script>
const SAMPLE_A = `# This data file generated by 23andMe at: Mon Feb 27 19:26:36 2023
# reference human assembly build 37
# rsid\tchromosome\tposition\tgenotype
rs3094315\t1\t752566\tAA
rs6672840\t1\t752721\tAG
rs4477212\t1\t752832\tGG
rs13302982\t1\t752889\tCC`;

const SAMPLE_B = `#AncestryDNA raw data download
#Data is reported on the + strand using human reference build 37.1
rsid\tchromosome\tposition\tallele1\tallele2
rs3131972\t1\t752721\tA\tG
rs3094315\t1\t752566\tA\tA
rs4477212\t1\t752832\tG\tG
rs99999999\t1\t752889\tC\tT`;

function detectFormat(lines) {
  const hdr = lines.filter(l => l.startsWith('#')).join('\n').toLowerCase();
  if (hdr.includes('23andme')) return '23andMe';
  if (hdr.includes('ancestrydna') || hdr.includes('ancestry')) return 'AncestryDNA';
  if (hdr.includes('familytree') || hdr.includes('ftdna')) return 'FamilyTreeDNA';
  if (hdr.includes('myheritage')) return 'MyHeritage';
  const firstData = lines.find(l => !l.startsWith('#') && l.trim()) || '';
  const cols = firstData.toLowerCase().split('\t');
  if (cols.includes('allele1')) return 'AncestryDNA';
  if (cols.includes('result')) return 'FamilyTreeDNA';
  if (cols.includes('genotype')) return '23andMe';
  return 'Unknown';
}

function normalizeGeno(g) {
  const clean = g.replace(/\//g, '').replace(/\s/g, '').toUpperCase();
  return clean.split('').sort().join('');
}

function parseFile(content) {
  const lines = content.split('\n');
  const format = detectFormat(lines);
  const snps = new Map();
  let colMap = null;
  let strandNote = '';

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (line.startsWith('#')) {
      const l = line.toLowerCase();
      if (l.includes('+ strand') || l.includes('+strand')) strandNote = '+ strand';
      else if (l.includes('forward strand')) strandNote = 'forward strand';
      continue;
    }
    const cols = line.split('\t').map(c => c.trim());
    if (colMap === null) {
      const lower = cols.map(c => c.toLowerCase().replace(/^#/, ''));
      colMap = {};
      lower.forEach((c, i) => { colMap[c] = i; });
      if (!('rsid' in colMap) && !('position' in colMap)) colMap = null;
      continue;
    }
    const rsid = cols[colMap['rsid']] || '';
    const chr = cols[colMap['chromosome']] || cols[colMap['chr']] || '';
    const pos = cols[colMap['position']] || '';
    let rawGeno = '';
    if (colMap['genotype'] !== undefined) rawGeno = cols[colMap['genotype']] || '';
    else if (colMap['result'] !== undefined) rawGeno = cols[colMap['result']] || '';
    else if (colMap['allele1'] !== undefined) rawGeno = (cols[colMap['allele1']] || '') + (cols[colMap['allele2']] || '');
    const hasSlash = rawGeno.includes('/');
    if (rsid && pos) snps.set(rsid, { rsid, chr, pos, rawGeno, geno: normalizeGeno(rawGeno), hasSlash });
  }

  const usesSlash = [...snps.values()].some(s => s.hasSlash);
  return { format, snps, usesSlash, strandNote, count: snps.size };
}

function compareFiles(a, b) {
  const discordant = [], rsidMismatch = [], onlyA = [], onlyB = [], concordant = [];
  const processedA = new Set(), processedB = new Set();

  const posB = new Map();
  for (const [rid, snp] of b.snps) posB.set(snp.pos, { rid, snp });

  for (const [rid, snpA] of a.snps) {
    if (b.snps.has(rid)) {
      const snpB = b.snps.get(rid);
      processedA.add(rid); processedB.add(rid);
      if (snpA.geno === snpB.geno) concordant.push({ rid, pos: snpA.pos, chr: snpA.chr, genoA: snpA.rawGeno, genoB: snpB.rawGeno });
      else discordant.push({ rid, pos: snpA.pos, chr: snpA.chr, genoA: snpA.rawGeno, genoB: snpB.rawGeno });
    } else if (posB.has(snpA.pos)) {
      const { rid: ridB, snp: snpB } = posB.get(snpA.pos);
      if (!processedB.has(ridB)) {
        processedA.add(rid); processedB.add(ridB);
        rsidMismatch.push({ ridA: rid, ridB, pos: snpA.pos, chr: snpA.chr, genoA: snpA.rawGeno, genoB: snpB.rawGeno });
      }
    }
  }
  for (const [rid, snp] of a.snps) if (!processedA.has(rid)) onlyA.push(snp);
  for (const [rid, snp] of b.snps) if (!processedB.has(rid)) onlyB.push(snp);
  return { discordant, rsidMismatch, onlyA, onlyB, concordant };
}

const state = { fileA: null, fileB: null, compared: null, activeTab: 'discordant', page: { discordant:0, rsidMismatch:0, onlyA:0, onlyB:0, concordant:0 }, dragging: null };
const PAGE_SIZE = 50;

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(buildHeader());
  app.appendChild(buildDropZones());
  if (state.fileA && state.fileB) app.appendChild(buildFormatBar());
  if (state.compared) {
    app.appendChild(buildStats());
    app.appendChild(buildStrandNote());
    app.appendChild(buildTabs());
    app.appendChild(buildTable());
  }
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e[k.toLowerCase()] = v;
    else if (k === 'className') e.className = v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => c != null && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

function buildHeader() {
  return el('div', {style: {marginBottom:'1.5rem'}},
    el('h2', {style:{fontSize:'18px',fontWeight:'500',marginBottom:'4px'}}, 'DNA raw file comparator'),
    el('p', {style:{fontSize:'13px',color:'var(--color-text-secondary)'}}, 'Compare SNP files from 23andMe, AncestryDNA, FamilyTreeDNA, MyHeritage')
  );
}

function buildDropZone(slot, label, color) {
  const f = state[slot];
  const div = el('div', {
    className: 'drop-zone' + (f ? ' loaded' : ''),
    style: { flex: '1', borderColor: f ? 'var(--color-border-primary)' : undefined },
    onDragover: e => { e.preventDefault(); e.currentTarget.classList.add('over'); },
    onDragleave: e => e.currentTarget.classList.remove('over'),
    onDrop: e => { e.preventDefault(); e.currentTarget.classList.remove('over'); handleFile(slot, e.dataTransfer.files[0]); },
    onClick: () => { const inp = document.createElement('input'); inp.type='file'; inp.accept='.txt,.csv,.tsv,.zip'; inp.onchange=e=>handleFile(slot,e.target.files[0]); inp.click(); }
  });
  const badge = el('span', {className:`badge badge-${color}`, style:{marginBottom:'4px'}}, label);
  if (f) {
    const fmt = el('span', {className:'badge badge-neutral', style:{marginBottom:'4px'}}, f.format);
    const name = el('p', {style:{fontFamily:'var(--font-mono)',fontSize:'12px',color:'var(--color-text-secondary)',wordBreak:'break-all',maxWidth:'200px'}}, f.name);
    const cnt = el('p', {style:{fontSize:'13px',fontWeight:'500'}}, f.count.toLocaleString() + ' SNPs');
    const strand = f.strandNote ? el('p', {style:{fontSize:'11px',color:'var(--color-text-secondary)',marginTop:'2px'}}, 'Reported: ' + f.strandNote) : null;
    const geno = el('p', {style:{fontSize:'11px',color:'var(--color-text-secondary)'}}, f.usesSlash ? 'Format: A/G (slash-separated)' : 'Format: AG (merged)');
    const clear = el('button', {style:{marginTop:'8px',fontSize:'11px',padding:'2px 8px',cursor:'pointer',borderRadius:'4px',border:'0.5px solid var(--color-border-secondary)',background:'transparent',color:'var(--color-text-secondary)'}, onClick: e=>{e.stopPropagation();state[slot]=null;state.compared=null;render();}}, '✕ clear');
    div.append(badge, fmt, name, cnt, geno);
    if (strand) div.appendChild(strand);
    div.appendChild(clear);
  } else {
    const icon = el('div', {style:{fontSize:'24px',color:'var(--color-text-tertiary)',lineHeight:'1'}}, '⬆');
    const txt = el('p', {style:{color:'var(--color-text-secondary)',fontSize:'13px'}}, 'Drop file or click to browse');
    const hint = el('p', {style:{color:'var(--color-text-tertiary)',fontSize:'11px',marginTop:'2px'}}, '.txt · tab-delimited · any company');
    div.append(badge, icon, txt, hint);
  }
  return div;
}

function buildDropZones() {
  const row = el('div', {style:{display:'flex',gap:'16px',marginBottom:'1.5rem',flexWrap:'wrap'}},
    buildDropZone('fileA', 'File A', 'info'),
    buildDropZone('fileB', 'File B', 'warn')
  );
  if (!state.fileA && !state.fileB) {
    const demo = el('button', {
      style:{display:'block',margin:'8px auto 0',fontSize:'12px',padding:'4px 12px',cursor:'pointer',borderRadius:'var(--border-radius-md)',border:'0.5px solid var(--color-border-secondary)',background:'transparent',color:'var(--color-text-secondary)'},
      onClick: () => { loadSample(); }
    }, 'Load sample data ↗');
    row.appendChild(demo);
  }
  return row;
}

function buildFormatBar() {
  const a = state.fileA, b = state.fileB;
  const notes = [];
  if (a.usesSlash !== b.usesSlash) notes.push('Genotype notation differs: one uses A/G, the other uses AG — normalized for comparison');
  if (a.format !== b.format) notes.push(`Company formats: ${a.format} vs ${b.format}`);
  if (!notes.length) return el('div');
  const d = el('div', {className:'notice',style:{marginBottom:'1rem'}});
  notes.forEach(n => d.appendChild(el('p', null, '⚠ ' + n)));
  return d;
}

function buildStats() {
  const c = state.compared;
  const total = c.discordant.length + c.rsidMismatch.length + c.onlyA.length + c.onlyB.length + c.concordant.length;
  const items = [
    ['Concordant', c.concordant.length, 'success'],
    ['Discordant', c.discordant.length, 'danger'],
    ['rsID mismatch', c.rsidMismatch.length, 'warn'],
    ['Only in A', c.onlyA.length, 'info'],
    ['Only in B', c.onlyB.length, 'info'],
  ];
  const grid = el('div', {style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'10px',marginBottom:'1.5rem'}});
  items.forEach(([lbl, num, cls]) => {
    const card = el('div', {className:'stat-card'});
    card.appendChild(el('div', {className:'stat-num', style:{color:`var(--color-text-${cls})`}}, num.toLocaleString()));
    card.appendChild(el('div', {className:'stat-lbl'}, lbl));
    grid.appendChild(card);
  });
  return grid;
}

function buildStrandNote() {
  const a = state.fileA, b = state.fileB;
  const both = a.strandNote && b.strandNote;
  const text = both
    ? `Both files report on the ${a.strandNote} — no complementing applied. Genotypes are compared directly after normalising allele order.`
    : 'Strand orientation not detected in headers. Most companies (23andMe, AncestryDNA, FTDNA) use the + strand. If files are from the same reference build (b37/hg19 or b38/hg38), direct comparison is valid.';
  return el('div', {className:'notice',style:{marginBottom:'1rem',fontSize:'12px'}}, text);
}

const TAB_DEFS = [
  { key:'discordant', label:'Discordant', badgeCls:'badge-danger' },
  { key:'rsidMismatch', label:'rsID mismatch', badgeCls:'badge-warn' },
  { key:'onlyA', label:'Only in A', badgeCls:'badge-info' },
  { key:'onlyB', label:'Only in B', badgeCls:'badge-info' },
  { key:'concordant', label:'Concordant', badgeCls:'badge-success' },
];

function buildTabs() {
  const c = state.compared;
  const counts = { discordant:c.discordant.length, rsidMismatch:c.rsidMismatch.length, onlyA:c.onlyA.length, onlyB:c.onlyB.length, concordant:c.concordant.length };
  const bar = el('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'1rem'}});
  TAB_DEFS.forEach(({key,label,badgeCls}) => {
    const btn = el('button', {
      className:'tab-btn' + (state.activeTab===key?' active':''),
      onClick:() => { state.activeTab=key; state.page[key]=0; render(); }
    }, label + ' ', el('span', {className:`badge ${badgeCls}`}, counts[key].toString()));
    bar.appendChild(btn);
  });
  return bar;
}

function buildTable() {
  const c = state.compared;
  const tab = state.activeTab;
  const page = state.page[tab];
  let rows, cols;

  if (tab === 'discordant') {
    rows = c.discordant;
    cols = ['rsID', 'Chr', 'Pos', 'Genotype (A)', 'Genotype (B)', 'Notes'];
  } else if (tab === 'rsidMismatch') {
    rows = c.rsidMismatch;
    cols = ['rsID (A)', 'rsID (B)', 'Chr', 'Pos', 'Geno (A)', 'Geno (B)'];
  } else if (tab === 'onlyA' || tab === 'onlyB') {
    rows = tab === 'onlyA' ? c.onlyA : c.onlyB;
    cols = ['rsID', 'Chr', 'Pos', 'Genotype'];
  } else {
    rows = c.concordant;
    cols = ['rsID', 'Chr', 'Pos', 'Genotype'];
  }

  const totalPages = Math.ceil(rows.length / PAGE_SIZE);
  const slice = rows.slice(page * PAGE_SIZE, (page+1) * PAGE_SIZE);

  const wrap = el('div', {style:{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',overflow:'hidden'}});

  const colWidths = tab === 'rsidMismatch' ? '1.4fr 1.4fr 0.4fr 0.8fr 0.5fr 0.5fr'
    : tab === 'discordant' ? '1.4fr 0.4fr 0.8fr 0.55fr 0.55fr 1fr'
    : '1.4fr 0.4fr 0.8fr 0.6fr';

  const hdrRow = el('div', {className:'snp-row snp-header', style:{gridTemplateColumns:colWidths}});
  cols.forEach(c => hdrRow.appendChild(el('div', {className:'snp-cell'}, c)));
  wrap.appendChild(hdrRow);

  if (slice.length === 0) {
    wrap.appendChild(el('div', {style:{padding:'1.5rem',textAlign:'center',color:'var(--color-text-secondary)',fontSize:'13px'}}, 'No entries'));
  }

  slice.forEach(row => {
    const tr = el('div', {className:'snp-row', style:{gridTemplateColumns:colWidths}});
    if (tab === 'discordant') {
      const note = makeDiscordantNote(row.genoA, row.genoB);
      [row.rid, row.chr, row.pos, row.genoA, row.genoB, note].forEach((v, i) => {
        const cls = i === 3 ? 'snp-cell' : i === 4 ? 'snp-cell' : 'snp-cell';
        const cell = el('div', {className:'snp-cell'});
        if (i === 3) cell.style.color = 'var(--color-text-danger)';
        if (i === 4) cell.style.color = 'var(--color-text-danger)';
        if (i === 5) { cell.style.fontSize = '11px'; cell.style.color = 'var(--color-text-secondary)'; cell.style.fontFamily = 'var(--font-sans)'; }
        cell.textContent = v;
        tr.appendChild(cell);
      });
    } else if (tab === 'rsidMismatch') {
      [row.ridA, row.ridB, row.chr, row.pos, row.genoA, row.genoB].forEach(v => {
        tr.appendChild(el('div', {className:'snp-cell'}, v));
      });
    } else if (tab === 'onlyA' || tab === 'onlyB') {
      [row.rsid, row.chr, row.pos, row.rawGeno].forEach(v => {
        tr.appendChild(el('div', {className:'snp-cell'}, v));
      });
    } else {
      [row.rid, row.chr, row.pos, row.genoA].forEach(v => {
        tr.appendChild(el('div', {className:'snp-cell'}, v));
      });
    }
    wrap.appendChild(tr);
  });

  const container = el('div');
  container.appendChild(wrap);

  if (totalPages > 1) {
    const pager = el('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'10px',fontSize:'12px',color:'var(--color-text-secondary)'}});
    const prev = el('button', {className:'tab-btn', style:{padding:'4px 10px',fontSize:'12px'}, onClick:()=>{state.page[tab]=Math.max(0,page-1);render();}}, '← prev');
    const next = el('button', {className:'tab-btn', style:{padding:'4px 10px',fontSize:'12px'}, onClick:()=>{state.page[tab]=Math.min(totalPages-1,page+1);render();}}, 'next →');
    if (page===0) prev.disabled = true;
    if (page===totalPages-1) next.disabled = true;
    pager.append(prev, `Page ${page+1} of ${totalPages} · ${rows.length.toLocaleString()} entries`, next);
    container.appendChild(pager);
  }
  return container;
}

function makeDiscordantNote(a, b) {
  const na = normalizeGeno(a), nb = normalizeGeno(b);
  if (na[0] !== nb[0] && na[0] === complement(nb[0])) return 'possible strand flip';
  if (na.length !== nb.length) return 'different call length';
  if (na === '--' || nb === '--') return 'no-call in one';
  const isHet = s => s.length===2 && s[0]!==s[1];
  if (isHet(na) && !isHet(nb)) return 'het vs hom';
  if (!isHet(na) && isHet(nb)) return 'hom vs het';
  return 'allele mismatch';
}

function complement(b) {
  return {A:'T',T:'A',C:'G',G:'C'}[b]||b;
}

function normalizeGeno(g) {
  const clean = g.replace(/\//g,'').replace(/\s/g,'').toUpperCase();
  return clean.split('').sort().join('');
}

function handleFile(slot, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseFile(e.target.result);
    parsed.name = file.name;
    state[slot] = parsed;
    if (state.fileA && state.fileB) state.compared = compareFiles(state.fileA, state.fileB);
    render();
  };
  reader.readAsText(file);
}

function loadSample() {
  const a = parseFile(SAMPLE_A); a.name = 'sample_23andme.txt';
  const b = parseFile(SAMPLE_B); b.name = 'sample_ancestry.txt';
  state.fileA = a; state.fileB = b;
  state.compared = compareFiles(a, b);
  render();
}

render();
</script>
